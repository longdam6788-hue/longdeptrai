<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tặng Mẹ - Con Yêu Mẹ Nhiều Lắm! ❤️</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Roboto:wght@300;400;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(
          135deg,
          #ff9a9e 0%,
          #fecfef 50%,
          #fecfef 100%
        );
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* Hiệu ứng hoa rơi */
      .flower {
        position: absolute;
        width: 20px;
        height: 20px;
        background: radial-gradient(circle, #ff69b4, #ff1493);
        border-radius: 50% 0 50% 0;
        animation: fall linear infinite;
      }

      @keyframes fall {
        0% {
          transform: translateY(-100vh) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
        position: relative;
        z-index: 10;
      }

      .heart {
        font-size: 100px;
        color: #ff1493;
        animation: heartbeat 1.5s ease-in-out infinite;
        margin-bottom: 20px;
      }

      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      h1 {
        font-family: "Dancing Script", cursive;
        font-size: 3.5em;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        margin-bottom: 20px;
      }

      .message {
        font-size: 1.4em;
        color: #fff;
        line-height: 1.6;
        margin-bottom: 30px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
      }

      .btn {
        background: linear-gradient(45deg, #ff69b4, #ff1493);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2em;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(255, 20, 147, 0.4);
        font-weight: bold;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(255, 20, 147, 0.6);
      }

      .photo-frame {
        margin: 40px 0;
        padding: 20px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        backdrop-filter: blur(10px);
      }

      .photo {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: 5px solid #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        object-fit: cover;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 2.5em;
        }
        .message {
          font-size: 1.2em;
        }
        .heart {
          font-size: 80px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Hiệu ứng hoa rơi -->
    <div class="flower" style="left: 10%; animation-duration: 10s"></div>
    <div
      class="flower"
      style="left: 20%; animation-duration: 12s; animation-delay: 2s"
    ></div>
    <div
      class="flower"
      style="left: 30%; animation-duration: 15s; animation-delay: 1s"
    ></div>
    <div class="flower" style="left: 40%; animation-duration: 11s"></div>
    <div
      class="flower"
      style="left: 50%; animation-duration: 13s; animation-delay: 3s"
    ></div>
    <div class="flower" style="left: 60%; animation-duration: 14s"></div>
    <div
      class="flower"
      style="left: 70%; animation-duration: 10s; animation-delay: 1s"
    ></div>
    <div class="flower" style="left: 80%; animation-duration: 12s"></div>
    <div
      class="flower"
      style="left: 90%; animation-duration: 16s; animation-delay: 2s"
    ></div>

    <div class="container">
      <div class="heart">💖</div>
      <h1>Mẹ Yêu Quý Của Con! ❤️</h1>

      <p class="message">
        Mẹ ơi, con chúc mẹ luôn mạnh khỏe, hạnh phúc và xinh đẹp mãi mãi! <br />
        Mẹ là người phụ nữ tuyệt vời nhất trên đời này. <br />
        Con yêu mẹ nhiều lắm! 💕
      </p>

      <div class="photo-frame">
        <!-- Thay ảnh của mẹ vào đây -->
        <img src="./6.png" alt="Ảnh Mẹ" class="photo" />
        <p style="margin-top: 15px; color: #fff; font-size: 1.1em">
          Ảnh mẹ yêu dấu 💝
        </p>
      </div>

      <button class="btn" onclick="showLove()">
        Gửi Lời Yêu Thương Thêm! 🌹
      </button>
    </div>

    <script>
      function showLove() {
        const messages = [
          "Mẹ là thiên thần của con! ✨",
          "Con hứa sẽ luôn ngoan và học giỏi để mẹ vui! 📚❤️",
          "Cảm ơn mẹ vì đã sinh ra và nuôi dưỡng con! 🙏",
          "Mẹ là nguồn sống, là động lực của con! 💪",
          "Con yêu mẹ đến tận trời xanh! 🌈",
        ];

        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        alert(randomMsg);
      }

      // Tạo thêm hoa rơi ngẫu nhiên
      function createFlower() {
        const flower = document.createElement("div");
        flower.className = "flower";
        flower.style.left = Math.random() * 100 + "%";
        flower.style.animationDuration = Math.random() * 5 + 10 + "s";
        flower.style.animationDelay = Math.random() * 5 + "s";
        document.body.appendChild(flower);

        setTimeout(() => {
          flower.remove();
        }, 20000);
      }

      setInterval(createFlower, 2000);
    </script>
  </body>
</html>
